<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>もりのかりうど</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#020a05;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
body{display:flex;align-items:center;justify-content:center;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
canvas{display:block;touch-action:none;border-radius:0}
</style>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
<canvas id="game"></canvas>
<script>
"use strict";
var GW=480,GH=640;
var canvas=document.getElementById("game");
var DPR=Math.min(window.devicePixelRatio||1,3);

function resize(){
  var vw=window.innerWidth,vh=window.innerHeight;
  var scale=Math.min(vw/GW,vh/GH);
  var cw=Math.floor(GW*scale),ch=Math.floor(GH*scale);
  canvas.style.width=cw+"px";canvas.style.height=ch+"px";
  canvas.width=GW*DPR;canvas.height=GH*DPR;
  var c=canvas.getContext("2d");c.setTransform(DPR,0,0,DPR,0,0);
}
resize();window.addEventListener("resize",resize);

var W=GW,H=GH;
var ctx=canvas.getContext("2d");

if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    var rd=typeof r==="number"?r:0;this.moveTo(x+rd,y);this.arcTo(x+w,y,x+w,y+h,rd);this.arcTo(x+w,y+h,x,y+h,rd);this.arcTo(x,y+h,x,y,rd);this.arcTo(x,y,x+w,y,rd);this.closePath();
  };
}

var MONSTERS=[
  {emoji:"👾",name:"スライミー",hp:1,score:100,speed:0.6,size:36},
  {emoji:"🍄",name:"キノコン",hp:1,score:120,speed:0.8,size:34},
  {emoji:"👻",name:"もりゴースト",hp:2,score:200,speed:0.5,size:40},
  {emoji:"🐸",name:"デカガエル",hp:2,score:250,speed:0.4,size:44},
  {emoji:"🦇",name:"やみコウモリ",hp:1,score:150,speed:1.2,size:30},
  {emoji:"🐗",name:"イノシシキング",hp:3,score:400,speed:0.35,size:48},
  {emoji:"🐻",name:"モリグマ",hp:4,score:600,speed:0.3,size:52},
  {emoji:"🐉",name:"コダチドラゴン",hp:5,score:900,speed:0.25,size:56},
  {emoji:"👹",name:"もりのオーガ",hp:7,score:1200,speed:0.2,size:58},
  {emoji:"🌳",name:"エンシェントツリー",hp:10,score:2000,speed:0.15,size:64}
];

var FN="'Zen Kaku Gothic New',sans-serif";
function dist(a,b,c,d){return Math.sqrt((a-c)*(a-c)+(b-d)*(b-d))}

function spawnMonster(wave){
  var avail=MONSTERS.slice(0,Math.min(MONSTERS.length,2+Math.floor(wave/2)));
  var t=avail[Math.floor(Math.random()*avail.length)];
  var o={};for(var k in t)o[k]=t[k];
  o.id=Math.random();o.x=30+Math.random()*(W-60);o.y=-30-Math.random()*40;
  o.vx=(Math.random()-0.5)*t.speed*0.6;o.vy=t.speed*(0.5+Math.random()*0.5);
  o.currentHp=t.hp;o.hitTimer=0;o.bobPhase=Math.random()*Math.PI*2;
  return o;
}

var emojiCache={};
MONSTERS.forEach(function(m){
  var cv=document.createElement("canvas"),s=Math.ceil(m.size*1.6);
  cv.width=s*2;cv.height=s*2;var x=cv.getContext("2d");x.scale(2,2);
  x.font=m.size+"px serif";x.textAlign="center";x.textBaseline="middle";
  x.fillText(m.emoji,s/2,s/2);emojiCache[m.emoji]={canvas:cv,drawSize:s};
});

var bgCache=null;
var flies=[];for(var fi=0;fi<35;fi++)flies.push({x:Math.random()*W,y:Math.random()*H,s:0.5+Math.random()*2,phase:Math.random()*Math.PI*2});

function drawTree(c,x,y,sc,dark){
  c.save();c.translate(x,y);c.scale(sc,sc);
  c.fillStyle=dark?"#2a1810":"#3d2517";c.beginPath();c.roundRect(-6,-14,12,28,3);c.fill();
  var cols=dark?["#0d3d1a","#0a3015","#10472a"]:["#1a6b35","#15572c","#1f7a3e"];
  c.fillStyle=cols[0];c.beginPath();c.ellipse(0,-42,30,38,0,0,Math.PI*2);c.fill();
  c.fillStyle=cols[1];c.beginPath();c.ellipse(-16,-30,24,30,0,0,Math.PI*2);c.fill();
  c.fillStyle=cols[2];c.beginPath();c.ellipse(15,-32,22,28,0,0,Math.PI*2);c.fill();
  c.restore();
}

function buildBg(){
  bgCache=document.createElement("canvas");bgCache.width=W*DPR;bgCache.height=H*DPR;
  var c=bgCache.getContext("2d");c.scale(DPR,DPR);
  var g1=c.createLinearGradient(0,0,0,H);g1.addColorStop(0,"#050e08");g1.addColorStop(0.3,"#081a0e");g1.addColorStop(0.7,"#0a2012");g1.addColorStop(1,"#0d2818");
  c.fillStyle=g1;c.fillRect(0,0,W,H);
  var rg=c.createRadialGradient(W/2,120,0,W/2,120,400);rg.addColorStop(0,"rgba(40,200,120,0.06)");rg.addColorStop(1,"transparent");c.fillStyle=rg;c.fillRect(0,0,W,H);
  for(var i=0;i<40;i++){c.fillStyle="rgba(180,255,200,"+(0.05+Math.random()*0.15)+")";c.beginPath();c.arc(Math.random()*W,Math.random()*H*0.4,0.5+Math.random(),0,Math.PI*2);c.fill();}
  [[25,130,.7],[100,100,.85],[190,110,.75],[290,90,.95],[380,115,.7],[445,100,.8]].forEach(function(a){drawTree(c,a[0],a[1],a[2],true)});
  [[-15,210,1.3],[75,230,1.1],[170,200,1.35],[270,220,1.15],[365,205,1.3],[455,225,1.05]].forEach(function(a){drawTree(c,a[0],a[1],a[2],false)});
  var gg=c.createRadialGradient(W/2,H+20,50,W/2,H+20,400);gg.addColorStop(0,"#15321a");gg.addColorStop(1,"#0d2212");
  c.fillStyle=gg;c.beginPath();c.ellipse(W/2,H+40,W,280,0,0,Math.PI*2);c.fill();
  [35,95,155,225,305,365,425].forEach(function(gx,i){var gy=H-55+(i%3)*14;c.strokeStyle="#2aaa4a";c.lineWidth=2;c.beginPath();c.moveTo(gx-4,gy);c.lineTo(gx-7,gy-13);c.stroke();c.strokeStyle="#239940";c.beginPath();c.moveTo(gx,gy);c.lineTo(gx,gy-15);c.stroke();c.strokeStyle="#2aaa4a";c.beginPath();c.moveTo(gx+4,gy);c.lineTo(gx+6,gy-12);c.stroke();});
  var vg=c.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.75);vg.addColorStop(0,"transparent");vg.addColorStop(1,"rgba(0,0,0,0.45)");c.fillStyle=vg;c.fillRect(0,0,W,H);
}

function drawBg(c,time){
  if(!bgCache)buildBg();c.drawImage(bgCache,0,0,W,H);c.save();
  for(var i=0;i<3;i++){var fogX=((time*0.01*(i+1)*0.3)%(W+200))-100,fogY=180+i*120;var fg=c.createRadialGradient(fogX,fogY,0,fogX,fogY,120+i*30);fg.addColorStop(0,"rgba(100,200,140,"+(0.025+i*0.008)+")");fg.addColorStop(1,"transparent");c.fillStyle=fg;c.fillRect(0,0,W,H);}
  c.globalAlpha=0.03+0.015*Math.sin(time/3000);c.fillStyle="#aaffcc";
  for(var r=0;r<4;r++){var rx=80+r*110+Math.sin(time/4000+r)*20;c.beginPath();c.moveTo(rx-5,0);c.lineTo(rx-30,H*0.6);c.lineTo(rx+30,H*0.6);c.lineTo(rx+5,0);c.closePath();c.fill();}
  c.globalAlpha=1;
  flies.forEach(function(p,i){p.phase+=0.008+i*0.001;c.globalAlpha=(0.15+0.6*(0.5+0.5*Math.sin(p.phase)))*0.8;c.fillStyle=i%3===0?"#aaffdd":i%3===1?"#ccff88":"#88ffcc";c.shadowColor=c.fillStyle;c.shadowBlur=8;c.beginPath();c.arc(p.x+Math.sin(p.phase*1.3)*12,p.y+Math.cos(p.phase*0.9)*8,p.s,0,Math.PI*2);c.fill();c.shadowBlur=0;});
  c.globalAlpha=1;c.restore();
}

function drawPlayer(c,x,y,angle){
  c.save();c.translate(x,y);
  c.fillStyle="rgba(40,200,120,0.1)";c.beginPath();c.ellipse(0,28,30,6,0,0,Math.PI*2);c.fill();
  c.fillStyle="rgba(0,0,0,0.4)";c.beginPath();c.ellipse(0,28,16,4,0,0,Math.PI*2);c.fill();
  c.fillStyle="#2a5580";c.beginPath();c.roundRect(-9,14,8,11,3);c.fill();c.beginPath();c.roundRect(1,14,8,11,3);c.fill();
  c.fillStyle="#3a2218";c.beginPath();c.roundRect(-10,22,10,6,2);c.fill();c.beginPath();c.roundRect(0,22,10,6,2);c.fill();
  var bg=c.createLinearGradient(-10,-8,10,14);bg.addColorStop(0,"#3a8acc");bg.addColorStop(1,"#2a6699");c.fillStyle=bg;c.beginPath();c.roundRect(-11,-8,22,23,7);c.fill();
  c.fillStyle="#5a3a1e";c.fillRect(-11,8,22,4);c.fillStyle="#ccaa44";c.beginPath();c.arc(0,10,3,0,Math.PI*2);c.fill();
  c.fillStyle="#1a4a2a";c.beginPath();c.moveTo(-10,-5);c.lineTo(-16,18);c.lineTo(-6,14);c.closePath();c.fill();
  c.fillStyle="#1a5030";c.beginPath();c.moveTo(10,-5);c.lineTo(16,18);c.lineTo(6,14);c.closePath();c.fill();
  c.fillStyle="#f0d0a0";c.beginPath();c.arc(0,-18,14,0,Math.PI*2);c.fill();
  c.fillStyle="#2a1a0e";c.beginPath();c.ellipse(0,-28,16,9,0,0,Math.PI*2);c.fill();c.beginPath();c.ellipse(-11,-22,7,11,0,0,Math.PI*2);c.fill();c.beginPath();c.ellipse(11,-22,7,11,0,0,Math.PI*2);c.fill();
  c.fillStyle="#1a1a2a";c.beginPath();c.arc(-5,-18,3.5,0,Math.PI*2);c.fill();c.beginPath();c.arc(5,-18,3.5,0,Math.PI*2);c.fill();
  c.fillStyle="#fff";c.beginPath();c.arc(-3.5,-19.5,1.5,0,Math.PI*2);c.fill();c.beginPath();c.arc(6.5,-19.5,1.5,0,Math.PI*2);c.fill();
  c.strokeStyle="#cc7755";c.lineWidth=1.5;c.lineCap="round";c.beginPath();c.moveTo(-3,-11);c.quadraticCurveTo(0,-8,3,-11);c.stroke();
  c.save();c.rotate(angle);c.shadowColor="rgba(100,255,180,0.3)";c.shadowBlur=6;c.strokeStyle="#8B5A2B";c.lineWidth=3.5;c.lineCap="round";c.beginPath();c.moveTo(-4,-22);c.quadraticCurveTo(12,0,-4,22);c.stroke();c.shadowBlur=0;
  c.strokeStyle="#ccbbaa";c.lineWidth=1;c.beginPath();c.moveTo(-4,-20);c.lineTo(-4,20);c.stroke();
  c.strokeStyle="#8B6914";c.lineWidth=2.5;c.beginPath();c.moveTo(-4,0);c.lineTo(22,0);c.stroke();
  c.fillStyle="#ccc";c.beginPath();c.moveTo(20,-4);c.lineTo(30,0);c.lineTo(20,4);c.closePath();c.fill();
  c.restore();c.restore();
}

function drawArrow(c,x,y,angle){
  c.save();c.translate(x,y);c.rotate(angle);c.globalAlpha=0.3;var tg=c.createLinearGradient(-24,0,0,0);tg.addColorStop(0,"transparent");tg.addColorStop(1,"rgba(180,255,200,0.5)");c.strokeStyle=tg;c.lineWidth=2;c.beginPath();c.moveTo(-24,0);c.lineTo(-8,0);c.stroke();c.globalAlpha=1;
  c.strokeStyle="#8B6914";c.lineWidth=2.5;c.beginPath();c.moveTo(-14,0);c.lineTo(10,0);c.stroke();c.fillStyle="#d0d0d0";c.beginPath();c.moveTo(10,-4);c.lineTo(20,0);c.lineTo(10,4);c.closePath();c.fill();
  c.strokeStyle="#cc4444";c.lineWidth=1.5;c.beginPath();c.moveTo(-14,0);c.lineTo(-10,-5);c.stroke();c.beginPath();c.moveTo(-14,0);c.lineTo(-10,5);c.stroke();c.restore();
}

function drawGlass(c,x,y,w,h,r){c.save();c.fillStyle="rgba(0,15,10,0.55)";c.beginPath();c.roundRect(x,y,w,h,r||8);c.fill();c.strokeStyle="rgba(100,255,180,0.15)";c.lineWidth=1;c.beginPath();c.roundRect(x,y,w,h,r||8);c.stroke();c.restore();}
function drawBar(c,x,y,w,h,ratio,c1,c2,r){c.fillStyle="rgba(0,0,0,0.4)";c.beginPath();c.roundRect(x,y,w,h,r||3);c.fill();if(ratio>0){var gr=c.createLinearGradient(x,0,x+w*ratio,0);gr.addColorStop(0,c1);gr.addColorStop(1,c2);c.fillStyle=gr;c.beginPath();c.roundRect(x,y,w*ratio,h,r||3);c.fill();}}

var screen="title";
var shake={x:0,y:0,t:0};
var gameoverTime=0;

function makeGame(hs){
  return{playerX:W/2,playerY:H-70,aimAngle:-Math.PI/2,projectiles:[],monsters:[],effects:[],spawnTimer:0,waveKills:0,waveTarget:5,mouseX:W/2,mouseY:H/2,score:0,highScore:hs||0,combo:0,comboTimer:0,arrows:10,wave:1,arrowRegenTimer:0,specialReady:false,luckyBoxes:[],boss:null,dog:null,level:1,xp:0,xpToNext:300,arrowSpeed:9,maxArrows:12,arrowRegenInterval:1800};
}
var g=makeGame(0);

function getPos(e){var r=canvas.getBoundingClientRect();var t=(e.touches&&e.touches[0])?e.touches[0]:(e.changedTouches&&e.changedTouches[0])?e.changedTouches[0]:e;return[(t.clientX-r.left)*(W/r.width),(t.clientY-r.top)*(H/r.height)];}

canvas.addEventListener("pointermove",function(e){var p=getPos(e);g.mouseX=p[0];g.mouseY=p[1];});
canvas.addEventListener("touchmove",function(e){e.preventDefault();if(e.touches[0]){var p=getPos(e);g.mouseX=p[0];g.mouseY=p[1];}},{passive:false});

function shoot(){if(g.arrows<=0)return;g.arrows--;g.projectiles.push({id:Math.random(),x:g.playerX,y:g.playerY-20,vx:Math.cos(g.aimAngle)*g.arrowSpeed,vy:Math.sin(g.aimAngle)*g.arrowSpeed,angle:g.aimAngle,special:false});}
function shootSpecial(){if(!g.specialReady)return;g.specialReady=false;g.effects.push({x:g.playerX,y:g.playerY-30,frame:0,type:"special_hit"});var spread=Math.PI/6;for(var i=-2;i<=2;i++){var a=g.aimAngle+i*(spread/2);g.projectiles.push({id:Math.random(),x:g.playerX,y:g.playerY-20,vx:Math.cos(a)*(g.arrowSpeed+2),vy:Math.sin(a)*(g.arrowSpeed+2),angle:a,special:true});}shake.t=200;}

var lastClick=0;
function handleClick(e){
  var pos=getPos(e);
  if(screen==="title"){var hs=g.highScore;g=makeGame(hs);screen="playing";lastClick=0;return;}
  if(screen==="gameover"){
    var p2=getPos(e);
    // Share buttons (always active)
    var sbY=370,sbW=90,sbH=36,sbGap=12;
    var shareText=encodeURIComponent("🏹もりのかりうど🌲\nスコア:"+g.score+" / WAVE "+g.wave+" / Lv."+g.level+"\n#もりのかりうど");
    var shareUrl=encodeURIComponent("https://tetsuyaokamura1980-spec.github.io/MoriNoKariudo/");
    if(p2[1]>=sbY&&p2[1]<=sbY+sbH){
      if(p2[0]>=W/2-sbW-sbGap/2&&p2[0]<=W/2-sbGap/2){window.open("https://x.com/intent/tweet?text="+shareText+"&url="+shareUrl,"_blank");return;}
      if(p2[0]>=W/2+sbGap/2&&p2[0]<=W/2+sbW+sbGap/2){window.open("https://www.facebook.com/sharer/sharer.php?u="+shareUrl+"&quote="+shareText,"_blank");return;}
    }
    // Retry button (1.5s guard)
    if(Date.now()-gameoverTime<1500)return;
    var bx=W/2-100,by2=430,bw2=200,bh2=48;
    if(p2[1]>=by2&&p2[1]<=by2+bh2&&p2[0]>=bx&&p2[0]<=bx+bw2){var hs=g.highScore;g=makeGame(hs);screen="playing";lastClick=0;}
    return;
  }
  if(screen==="playing"){var angle=Math.atan2(pos[1]-(g.playerY-20),pos[0]-g.playerX);if(angle>0.2)angle=0.2;g.aimAngle=angle;var now=Date.now();if(g.specialReady&&now-lastClick<300){shootSpecial();lastClick=0;}else{shoot();lastClick=now;}}
}
canvas.addEventListener("click",handleClick);
canvas.addEventListener("touchend",function(e){e.preventDefault();handleClick(e);},{passive:false});
canvas.addEventListener("contextmenu",function(e){e.preventDefault();});

var lastTime=0;
function loop(time){
  var dt=Math.min(33,time-(lastTime||time));lastTime=time;var dtM=dt/16;
  if(shake.t>0){shake.t-=dt;shake.x=(Math.random()-0.5)*shake.t*0.04;shake.y=(Math.random()-0.5)*shake.t*0.04;}else{shake.x=0;shake.y=0;}

  ctx.save();ctx.setTransform(DPR,0,0,DPR,0,0);ctx.translate(shake.x,shake.y);
  drawBg(ctx,time);

  if(screen==="playing"){
    g.aimAngle=Math.atan2(g.mouseY-(g.playerY-20),g.mouseX-g.playerX);if(g.aimAngle>0.2)g.aimAngle=0.2;
    g.arrowRegenTimer+=dt;if(g.arrowRegenTimer>g.arrowRegenInterval&&g.arrows<g.maxArrows){g.arrows++;g.arrowRegenTimer=0;}
    if(g.comboTimer>0){g.comboTimer-=dt;if(g.comboTimer<=0)g.combo=0;}

    g.luckyBoxes=(g.luckyBoxes||[]).filter(function(b){b.y+=0.5*dtM;b.bobPhase+=0.05*dtM;b.life-=dt;return b.life>0&&b.y<H+20;});
    g.luckyBoxes=g.luckyBoxes.filter(function(b){
      if(dist(g.playerX,g.playerY-20,b.x,b.y)<50){g.specialReady=true;g.effects.push({x:b.x,y:b.y,frame:0,type:"lucky",text:"⚡必殺GET！"});return false;}
      for(var pi=0;pi<g.projectiles.length;pi++){var p=g.projectiles[pi];if(!p.special&&dist(p.x,p.y,b.x,b.y)<28){g.specialReady=true;g.effects.push({x:b.x,y:b.y,frame:0,type:"lucky",text:"⚡必殺GET！"});return false;}}
      return true;
    });

    g.spawnTimer+=dt;var rate=Math.max(800,2500-g.wave*150);
    if(!g.boss&&g.spawnTimer>rate){g.spawnTimer=0;g.monsters.push(spawnMonster(g.wave));}
    g.projectiles=g.projectiles.filter(function(p){p.x+=p.vx*dtM;p.y+=p.vy*dtM;return p.x>-20&&p.x<W+20&&p.y>-20&&p.y<H+20;});

    var escaped=false;
    g.monsters=g.monsters.filter(function(m){m.x+=m.vx*dtM;m.y+=m.vy*dtM;m.bobPhase+=0.04*dtM;if(m.hitTimer>0)m.hitTimer-=dt;if(m.x<m.size/2){m.x=m.size/2;m.vx=Math.abs(m.vx);}if(m.x>W-m.size/2){m.x=W-m.size/2;m.vx=-Math.abs(m.vx);}if(m.y>H+30){escaped=true;return false;}return true;});
    if(escaped){g.highScore=Math.max(g.highScore,g.score);screen="gameover";gameoverTime=Date.now();}

    g.projectiles=g.projectiles.filter(function(p){
      var hit=false;
      for(var i=g.monsters.length-1;i>=0;i--){var m=g.monsters[i];
        if(dist(p.x,p.y,m.x,m.y+Math.sin(m.bobPhase)*5)<m.size*0.7){
          hit=true;if(p.special)m.currentHp=0;else m.currentHp--;m.hitTimer=200;shake.t=p.special?200:80;
          g.effects.push({x:p.x,y:p.y,frame:0,type:p.special?"special_hit":"hit"});
          if(m.currentHp<=0){
            g.combo++;g.comboTimer=3000;var mul=Math.min(4,1+g.combo*0.25);var pts=Math.floor(m.score*mul*(p.special?2:1));g.score+=pts;g.waveKills++;
            g.effects.push({x:m.x,y:m.y,frame:0,type:"score",text:"+"+pts});
            for(var dp=0;dp<6;dp++)g.effects.push({x:m.x+(Math.random()-0.5)*m.size,y:m.y+(Math.random()-0.5)*m.size,frame:0,type:"particle",vx:(Math.random()-0.5)*4,vy:-Math.random()*3});
            var dropBonus=g.wave>=30?0.15:0;
            if(Math.random()<0.4+dropBonus)g.arrows=Math.min(g.maxArrows,g.arrows+1);
            g.xp+=m.hp*30+m.score/10;
            if(g.xp>=g.xpToNext){g.xp-=g.xpToNext;g.level++;g.xpToNext=Math.floor(g.xpToNext*1.4);g.arrowSpeed+=0.8;g.maxArrows+=1;g.arrowRegenInterval=Math.max(800,g.arrowRegenInterval-50);g.effects.push({x:W/2,y:H/2,frame:0,type:"levelup",text:"Lv."+g.level});shake.t=300;}
            if(!g.specialReady&&Math.random()<0.15+dropBonus)g.luckyBoxes.push({id:Math.random(),x:m.x,y:m.y,bobPhase:0,life:6000});
            g.monsters.splice(i,1);
            if(g.waveKills>=g.waveTarget){
